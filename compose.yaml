services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pqi_fabric
      POSTGRES_USER: pqi
      POSTGRES_PASSWORD: pqi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/seed_data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/seed_data/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqi -d pqi_fabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  hapi:
    image: hapiproject/hapi:v8.6.5-1
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.fhir_version=R5
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/fhir/metadata > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pqi:pqi@postgres:5432/pqi_fabric
      HAPI_BASE_URL: http://hapi:8080/fhir
    depends_on:
      postgres:
        condition: service_healthy
      hapi:
        condition: service_healthy

  ui:
    build: ./apps/ui
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
